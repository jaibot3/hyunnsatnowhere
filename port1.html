<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <title>Portfolio - HYUNNE</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #fcfdff; /* 메인 페이지 배경색 톤 유지 */
            font-family: 'Google Sans', 'Helvetica Neue', Arial, sans-serif;
            color: #1a1a1a;
            -webkit-text-size-adjust: 100%;
        }

        /* ── 타이틀 (기존 구조 완벽 유지) ── */
        .title {
            position: fixed; 
            top: 0px; 
            left: 6px; 
            margin: 0;
            font-weight: 700; 
            font-size: 70px; 
            line-height: 1;
            font-style: italic;
            color: #ffffff; 
            letter-spacing: 0.01em;
            pointer-events: none;
            z-index: 1000;
        }

        /* ── 본문 래퍼 (타이틀 아래 공간 확보) ── */
        .portfolio-wrap {
            padding-top: 120px; /* 고정 타이틀 높이만큼 밀어내기 */
            display: flex;
            max-width: 100%;
            padding-left: 2%;
            padding-right: 2%;
            padding-bottom: 100px;
        }

        /* ── 왼쪽 메뉴 (26%) ── */
        .sidebar {
            width: 26%;
            padding-right: 20px;
            /* 스크롤 시 메뉴가 화면 상단에 멈춰있도록 설정 */
            position: sticky; 
            top: 120px; 
            height: max-content; 
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .year-menu {
            font-size: 22px;
            font-weight: 500;
            color: #fcfdff;
            text-decoration: none;
            opacity: 0.4;
            transition: opacity 0.3s ease, color 0.3s ease;
        }
        
        .year-menu:hover, .year-menu.active {
            opacity: 1;
            color: #f57438;
        }

        /* ── 오른쪽 갤러리 (74%, 4열 배치) ── */
        .gallery {
            width: 74%;
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2개씩 진열 */
            gap: 16px;
        }

        .work-item {
            aspect-ratio: 1 / 1; /* 세로형 직사각형 비율 (필요시 1/1 등 수정 가능) */
            background-color: #dfcae0; /* 이미지 없을 때 보이는 더미 컬러 */
            border-radius: 0px; /* 모서리 둥글게 변경가능 */
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .work-item:hover {
            transform: translateY(-8px); /* 마우스 오버 시 살짝 떠오르는 효과 */
        }

        .work-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ── 모바일 환경 분기점 (< 768px) ── */
        @media (max-width: 768px) {
            .title {
                font-size: 48px; /* 모바일 타이틀 크기 축소 */
            }

            .portfolio-wrap {
                padding-top: 80px; 
                flex-direction: column; /* 가로 분할을 세로 분할로 변경 */
                padding-left: 4%;
                padding-right: 4%;
            }

            /* 모바일: 왼쪽 정렬 메뉴가 타이틀 밑으로 가며 병렬(수평) 배치됨 */
            .sidebar {
                width: 100%;
                position: relative; /* 스티키 고정 해제 */
                top: 0;
                flex-direction: row; /* 수평 배열 */
                flex-wrap: wrap; /* 넘치면 다음 줄로 */
                gap: 6px 24px;
                margin-bottom: 20px;
                border-bottom: 0px solid rgba(0,0,0,0); /* 리스트메뉴 하단 보더 */
                padding-bottom: 20px;
            }

            .year-menu {
                font-size: 24px; /* 모바일 메뉴 폰트 축소 */
            }

            /* 모바일: 작업사진 2개씩 진열 */
            .gallery {
                width: 100%;
                grid-template-columns: repeat(2, 1fr); /* 2열로 강제 변경 */
                gap: 12px;
            }
        }
    </style>
</head>
<body>

    <h1 class="title">HYUNNE</h1>

    <div class="portfolio-wrap">
        
        <div class="sidebar">
            <a href="#" class="year-menu active">2026</a>
            <a href="#" class="year-menu">2025</a>
            <a href="#" class="year-menu">2024</a>
            <a href="#" class="year-menu">2023</a>
            <a href="#" class="year-menu">Archive</a>
        </div>

        <div class="gallery">
            <div class="work-item"></div>
            <div class="work-item"></div>
            <div class="work-item"></div>
            <div class="work-item"></div>
            
            <div class="work-item" style="background-color: #cdbcd8;"></div>
            <div class="work-item" style="background-color: #cdbcd8;"></div>
            <div class="work-item" style="background-color: #cdbcd8;"></div>
            <div class="work-item" style="background-color: #cdbcd8;"></div>
        </div>

    </div>

</body>
</html>
