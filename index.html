<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Art</title>
    <style>
        body { margin: 0; background-color: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .art-container { position: relative; width: 1000px; max-width: 100%; }
        .art-container img { width: 100%; height: auto; display: block; }
        
        .art-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* 마법의 입체 효과 */
        .stone-path {
            fill: transparent;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            transform-origin: center;
        }
        .stone-path:hover {
            fill: rgba(255, 255, 255, 0.15); /* 반투명 하얀 막 */
            filter: drop-shadow(0px 15px 20px rgba(0, 0, 0, 0.8)); /* 입체 그림자 */
            transform: scale(1.03); /* 3% 팝업 */
            z-index: 10;
        }
    </style>
</head>

    <div class="art-container">
