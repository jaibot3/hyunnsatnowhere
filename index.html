<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,wght@0,400;0,500;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <title>Interactive Art</title>
    <style>
        body { margin: 0; background-color: #efebf2; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .art-container { position: relative; width: 1000px; max-width: 100%; }
        .art-container svg { width: 100%; height: auto; display: block; }
        .title {
            position: fixed; top: 0px; left: 6px; margin: 0;
            font-family: 'Google Sans', 'Helvetica Neue', Arial, sans-serif;
            font-weight: 300; font-size: 70px; line-height: 1;
            color: #1a1a1a; letter-spacing: 0.01em;
            pointer-events: none;
        }
        .stone {
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), filter 0.4s ease;
        }
        .stone:hover {
            transform: translateY(-12px) scale(1.05);
            filter: url(#lift) brightness(1.12) saturate(1.08);
        }
    </style>
</head>
<body>

    <div class="art-container">
        <svg viewBox="0 0 1440 1174" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">

            <defs>
                <clipPath id="clip1"><path d="M1037 723H1097C1112.33 719.667 1152.6 713 1191 713C1239 713 1237 723 1247 723C1257 723 1273 723 1313 745C1353 767 1359 781 1373 819C1387 857 1369 859 1359 897C1349 935 1355 935 1341 977C1327 1019 1297 1023 1273 1047C1249 1071 1185 1101 1129 1101C1084.2 1101 991.667 1085 951 1077L919 1047C902.333 1043.67 863 1034.2 839 1023C809 1009 751 909 763 845C775 781 811 755 853 735C886.6 719 932.333 713.667 951 713C975.667 716.333 1027.4 723 1037 723Z"/></clipPath>
                <clipPath id="clip2"><path d="M780.5 404C808 394 814.5 380.5 830.5 372.5C847.667 366.5 889.6 354.5 920 354.5C958 354.5 979.5 362.5 1001.5 384.5C1023.5 406.5 1053 404 1053 434C1053 464 1057 497.5 1053 527.5C1049 557.5 1045.5 563.5 1017.5 581.5C989.5 599.5 926 617 882 617C838 617 780.5 629 749 617C717.5 605 715 585.5 703 563.5C691 541.5 685 525.5 687 486C689 446.5 707 444 715 434C723 424 753 414 780.5 404Z"/></clipPath>
                <clipPath id="clip3"><path d="M496 310.5C480 276.5 490 239 512 195C520.667 187.833 541.5 170.3 555.5 157.5C573 141.5 587.5 137.5 619.5 115.5C651.5 93.5 701 74 776.5 52C852 30 840.5 42 894 52C947.5 62 944 90 961.5 115.5C979 141 953.5 195 944 223C934.5 251 904 296.5 840.5 328.5C777 360.5 713 378.5 643.5 378.5C574 378.5 512 344.5 496 310.5Z"/></clipPath>
                <clipPath id="clip4"><path d="M209.5 752.5C285 748.5 255 758.5 293 766.5C303 771.167 329 777.7 353 766.5C383 752.5 438.5 792 438.5 812C438.5 832 442.5 854 438.5 870C434.5 886 416.5 951.5 394.5 983.5C372.5 1015.5 325 1053 293 1065C261 1077 185.5 1051 146 1039C106.5 1027 80 963.5 62 923.5C44 883.5 68 800 100 766.5C132 733 134 756.5 209.5 752.5Z"/></clipPath>

                <radialGradient id="headGlow">
                    <stop offset="0" stop-color="#fff6ee" stop-opacity="0.95"/>
                    <stop offset="32%" stop-color="#f3cbba" stop-opacity="0.55"/>
                    <stop offset="100%" stop-color="#e7b6c8" stop-opacity="0"/>
                </radialGradient>
                <linearGradient id="cometTail" x1="0" y1="0" x2="1" y2="0">
                    <stop offset="0" stop-color="#f4ddd0" stop-opacity="0.85"/>
                    <stop offset="13%" stop-color="#dfcae0" stop-opacity="0.55"/>
                    <stop offset="55%" stop-color="#cdbcd8" stop-opacity="0.24"/>
                    <stop offset="100%" stop-color="#cdbcd8" stop-opacity="0"/>
                </linearGradient>
                <filter id="soften" x="-40%" y="-60%" width="180%" height="220%">
                    <feGaussianBlur stdDeviation="8"/>
                </filter>

                <!-- 별 자체의 은은한 앰비언트 광 -->
                <radialGradient id="starRadial">
                    <stop offset="0" stop-color="#ffffff" stop-opacity="1"/>
                    <stop offset="45%" stop-color="#f4f1e8" stop-opacity="0.5"/>
                    <stop offset="100%" stop-color="#f4f1e8" stop-opacity="0"/>
                </radialGradient>
                <!-- 별 실루엣을 부드럽게 빛나게 하는 글로우 필터 -->
                <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
                    <feGaussianBlur stdDeviation="5" result="blur1"/>
                    <feGaussianBlur in="blur1" stdDeviation="9" result="blur2"/>
                    <feMerge>
                        <feMergeNode in="blur2"/>
                        <feMergeNode in="blur1"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>

                <filter id="lift" x="-40%" y="-40%" width="180%" height="180%">
                    <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="black" flood-opacity="0.55"/>
                </filter>
            </defs>

            <image href="hyunne.jpg" x="0" y="0" width="1440" height="1174" preserveAspectRatio="none"/>

            <a class="stone-link" href="https://github.com/link1" data-x="1070" data-y="907">
                <image class="stone" style="transform-origin:1070px 907px;" href="hyunne.jpg" x="0" y="0" width="1440" height="1174" preserveAspectRatio="none" clip-path="url(#clip1)"/>
            </a>
            <a class="stone-link" href="https://github.com/link2" data-x="872" data-y="492">
                <image class="stone" style="transform-origin:872px 492px;" href="hyunne.jpg" x="0" y="0" width="1440" height="1174" preserveAspectRatio="none" clip-path="url(#clip2)"/>
            </a>
            <a class="stone-link" href="https://github.com/link3" data-x="729" data-y="215">
                <image class="stone" style="transform-origin:729px 215px;" href="hyunne.jpg" x="0" y="0" width="1440" height="1174" preserveAspectRatio="none" clip-path="url(#clip3)"/>
            </a>
            <a class="stone-link" href="https://github.com/link4" data-x="250" data-y="909">
                <image class="stone" style="transform-origin:250px 909px;" href="hyunne.jpg" x="0" y="0" width="1440" height="1174" preserveAspectRatio="none" clip-path="url(#clip4)"/>
            </a>

            <!-- 혜성 꼬리(부드러운 플룸) + 머리 글로우 -->
            <g id="trail" pointer-events="none" opacity="0">
                <path id="plume" fill="url(#cometTail)" filter="url(#soften)"/>
                <circle id="hglow" cx="0" cy="0" r="50" fill="url(#headGlow)" filter="url(#soften)"/>
            </g>

            <!-- 별: 점묘 대신 글로우로 채움. JS가 채움 -->
            <g id="star" pointer-events="none" transform="translate(720 250) scale(0.5)"></g>

        </svg>
    </div>

    <div class="title">HYUNNE at Nowhere</div>

    <script>
        const NS = 'http://www.w3.org/2000/svg';
        const star = document.getElementById('star');
        const trail = document.getElementById('trail');
        const plume = document.getElementById('plume');

        const homeX = 720, homeY = 820;
        let x = homeX, y = homeY;
        const SIZE = 0.5;

        // 이동(가속)
        let sailing = false, href = null;
        let sx = 0, sy = 0, dirX = 0, dirY = 0, totalDist = 0, traveled = 0, vel = 0;
        const V0 = 1.5, ACCEL = 0.16, VMAX = 10;

        // 꼬리 성장
        const GROW = 2.05, MAXLEN = 500, TAILW = 30;

        function rnd(a, b) { return a + Math.random() * (b - a); }
        function polar(deg, rad) { const r = deg * Math.PI / 180; return [Math.cos(r) * rad, Math.sin(r) * rad]; }

        // 별 폴리곤 (손그림 랜덤한 5각별 윤곽)
        const verts = [];
        for (let i = 0; i < 5; i++) {
            verts.push(polar(-90 + i * 72 + rnd(-8, 8), 40 * rnd(0.82, 1.16)));
            verts.push(polar(-90 + i * 72 + 36 + rnd(-9, 9), 17 * rnd(0.72, 1.32)));
        }

        // 별 = 은은한 앰비언트 원(뒤) + 글로우 필터 먹인 실루엣(위)
        const starAmbient = document.createElementNS(NS, 'circle');
        starAmbient.setAttribute('cx', 0); starAmbient.setAttribute('cy', 0);
        starAmbient.setAttribute('r', 40);
        starAmbient.setAttribute('fill', 'url(#starRadial)');
        star.appendChild(starAmbient);

        const starShape = document.createElementNS(NS, 'path');
        starShape.setAttribute('d', 'M' + verts.map(function (p) { return p[0].toFixed(1) + ' ' + p[1].toFixed(1); }).join(' L') + ' Z');
        starShape.setAttribute('fill', '#fbf8f1');
        starShape.setAttribute('filter', 'url(#glow)');
        star.appendChild(starShape);

        let g = 1;
        let running = false;
        const t0 = performance.now();

        function plumePath(L, W) {
            return 'M0 -7'
                + ' Q ' + (L * 0.28) + ' ' + (-W) + ' ' + (L * 0.6) + ' ' + (-W * 0.62)
                + ' Q ' + (L * 0.88) + ' ' + (-W * 0.22) + ' ' + L + ' 0'
                + ' Q ' + (L * 0.88) + ' ' + (W * 0.22) + ' ' + (L * 0.6) + ' ' + (W * 0.62)
                + ' Q ' + (L * 0.28) + ' ' + W + ' 0 7 Z';
        }

        function frame(now) {
            const t = (now - t0) / 1000;
            const spin = t * 5;

            // 숨쉬는 글로우: 우웅우웅 켜졌다 사라졌다
            const breathe = (Math.sin(t * 1.0) + 1) / 2;               // 0..1, 느린 주기(약 6.3초)
            const glowPulse = 0.15 + 0.85 * Math.pow(breathe, 1.5);
            starAmbient.setAttribute('opacity', glowPulse.toFixed(3));
            starAmbient.setAttribute('r', (30 + 24 * breathe).toFixed(1));
            starShape.setAttribute('opacity', (0.35 + 0.65 * glowPulse).toFixed(3));

            g += ((sailing ? 0 : 1) - g) * 0.15;

            let tailDeg = 0, trailOp = 0;

            if (sailing) {
                vel = Math.min(VMAX, vel + ACCEL);
                traveled += vel;
                tailDeg = Math.atan2(dirY, dirX) * 180 / Math.PI + 180;
                if (traveled >= totalDist) {
                    running = false;
                    star.setAttribute('transform', 'translate(' + (sx + dirX * totalDist) + ' ' + (sy + dirY * totalDist) + ') rotate(' + spin + ') scale(' + SIZE + ')');
                    trail.setAttribute('opacity', 0);
                    window.location.href = href;
                    return;
                }
                x = sx + dirX * traveled;
                y = sy + dirY * traveled;
                const remain = totalDist - traveled;
                trailOp = Math.min(1, Math.min(traveled, remain) / 130);
            } else {
                x = homeX + Math.sin(t * 0.18) * 200;
                y = homeY + Math.sin(t * 0.5) * 14 + Math.sin(t * 0.31) * 8;
            }

            if ((1 - g) > 0.01) {
                const L = Math.max(30, Math.min(MAXLEN, traveled * GROW));
                const W = TAILW * (0.6 + 0.4 * Math.min(1, L / MAXLEN));
                plume.setAttribute('d', plumePath(L, W));
                trail.setAttribute('transform', 'translate(' + x + ' ' + y + ') rotate(' + tailDeg + ') scale(' + SIZE + ')');
                trail.setAttribute('opacity', ((1 - g) * trailOp).toFixed(3));
            } else {
                trail.setAttribute('opacity', 0);
            }

            star.setAttribute('transform', 'translate(' + x + ' ' + y + ') rotate(' + spin + ') scale(' + SIZE + ')');
            requestAnimationFrame(frame);
        }

        function startLoop() {
            if (running) return;
            running = true;
            requestAnimationFrame(frame);
        }

        window.addEventListener('pageshow', function () {
            sailing = false; traveled = 0; vel = 0; g = 1;
            x = homeX; y = homeY;
            trail.setAttribute('opacity', 0);
            startLoop();
        });

        startLoop();

        document.querySelectorAll('a.stone-link').forEach(function (a) {
            a.addEventListener('click', function (e) {
                e.preventDefault();
                const tx = parseFloat(a.dataset.x), ty = parseFloat(a.dataset.y);
                sx = x; sy = y;
                const dx = tx - sx, dy = ty - sy;
                totalDist = Math.hypot(dx, dy) || 1;
                dirX = dx / totalDist; dirY = dy / totalDist;
                traveled = 0; vel = V0;
                href = a.getAttribute('href');
                sailing = true;
            });
        });
    </script>

</body>
</html>
